<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GH Dashboard</title>
<script src="d3.min.js"></script>
<script src="d3-sankey.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    overflow: hidden;
    scrollbar-width: none;
  }
  html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
  body {
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #333; height: 100vh; display: flex; flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
  }
  #dashboard-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    padding: 18px 22px 10px;
    border-bottom: 1px solid #ececec;
    background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
  }
  #head-tools {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #chart-title {
    font-size: 22px;
    line-height: 1.1;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
  }
  #chart-subtitle {
    font-size: 12px;
    line-height: 1.4;
    color: #666;
    max-width: 680px;
  }
  #chart-meta {
    font-size: 11px;
    color: #777;
    white-space: nowrap;
  }
  #chart-wrap { flex: 1; min-height: 0; position: relative; user-select: none; -webkit-user-select: none; }
  svg { display: block; width: 100%; height: 100%; overflow: visible; }

  .node rect, .node circle { stroke: #fff; stroke-width: 2px; transition: opacity 0.2s; cursor: pointer; }
  .node rect:hover, .node circle:hover { opacity: 0.7; }
  .node text { pointer-events: none; }
  .parent-label { font-size: 11px; font-weight: bold; fill: #555; text-transform: uppercase; letter-spacing: 0.05em; }
  .sankey-link { fill: none; stroke-opacity: 1; transition: stroke-opacity 0.2s; cursor: pointer; }
  .sankey-link:hover { stroke-opacity: 1; }

  #tooltip {
    position: absolute; background: rgba(255,255,255,0.95); border: 1px solid #ddd;
    padding: 8px 12px; border-radius: 4px; pointer-events: none; opacity: 0;
    font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000;
  }
  .tt-name { font-weight: 700; color: #111; margin-bottom: 2px; }
  .tt-val  { color: #555; font-size: 11px; }
  #err-overlay {
    display: none; position: fixed; top: 8px; left: 8px; right: 8px;
    background: #fff0f0; border: 1px solid #f88; border-radius: 4px;
    padding: 8px 12px; font-size: 11px; color: #900; z-index: 9999;
    white-space: pre-wrap; word-break: break-all;
  }
  /* ── UI overlay bar ─────────────────────────────── */
  #ui-bar {
    display: flex; align-items: center; gap: 8px;
    pointer-events: none;
  }
  #ui-hints {
    font-size: 10px; color: #666; letter-spacing: 0.03em;
    background: #f4f4f4; padding: 6px 12px;
    border-radius: 20px; border: 1px solid #e0e0e0;
    pointer-events: none; white-space: nowrap;
  }
  .ui-btn {
    width: 36px; height: 36px; border-radius: 9px;
    background: #ffffff; border: 1px solid #cfcfcf;
    cursor: pointer; pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: background 0.15s, border-color 0.15s, color 0.15s;
    color: #333;
  }
  .ui-btn svg {
    width: 17px;
    height: 17px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .ui-btn:hover { background: #f3f3f3; border-color: #b9b9b9; color: #111; }
</style>
</head>
<body>

<div id="dashboard-head">
  <div>
    <div id="chart-title">Data Muncher</div>
    <div id="chart-subtitle">Connect data in Grasshopper</div>
  </div>
  <div id="head-tools">
    <div id="chart-meta"></div>
    <div id="ui-bar"></div>
  </div>
</div>

<div id="chart-wrap">
  <svg id="chart"></svg>
</div>
<div id="err-overlay"></div>

<script src="js/shared.js"></script>
<script src="js/export.js"></script>
<script src="charts/treemap.js"></script>
<script src="charts/pack.js"></script>
<script src="charts/bar.js"></script>
<script src="charts/sunburst.js"></script>
<script src="charts/sankey.js"></script>
<script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GH Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #333; height: 100vh; display: flex; flex-direction: column;
  }
  #chart-wrap { flex: 1; min-height: 0; position: relative; }
  svg { display: block; width: 100%; height: 100%; overflow: visible; }

  .node rect, .node circle { stroke: #fff; stroke-width: 2px; transition: opacity 0.2s; cursor: pointer; }
  .node rect:hover, .node circle:hover { opacity: 0.7; }
  .node text { pointer-events: none; }
  .parent-label { font-size: 11px; font-weight: bold; fill: #555; text-transform: uppercase; letter-spacing: 0.05em; }
  .sankey-link { fill: none; stroke-opacity: 0.3; transition: stroke-opacity 0.2s; cursor: pointer;}
  .sankey-link:hover { stroke-opacity: 0.6; }

  #tooltip {
    position: absolute; background: rgba(255,255,255,0.95); border: 1px solid #ddd;
    padding: 8px 12px; border-radius: 4px; pointer-events: none; opacity: 0;
    font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000;
  }
  .tt-name { font-weight: 700; color: #111; margin-bottom: 2px; }
  .tt-val { color: #555; font-size: 11px; }
</style>
</head>
<body>

<div id="chart-wrap">
  <svg id="chart"></svg>
</div>

<script>
const DATA_FILE = "gh_dashboard.json";
const POLL_MS = 100;
const UNIT = "m²";
const color = d3.scaleOrdinal(d3.schemeTableau10);

let lastUpdated = null;
let lastChartType = null;
let activeGroup = null;
const svg = d3.select("#chart");
const tooltip = d3.select("body").append("div").attr("id", "tooltip");

// ── persistent zoom / pan wrapper ─────────────────────────────────────────
// scroll = zoom  ·  drag = pan  ·  double-click = reset
const zoomGroup = svg.append("g").attr("class", "zoom-root");

const zoom = d3.zoom()
  .scaleExtent([0.05, 10])
  .on("zoom", event => zoomGroup.attr("transform", event.transform.toString()));

svg.call(zoom).on("dblclick.zoom", null);
svg.on("dblclick", () => svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity));

function showTT(e, name, val, group) {
  let gText = (group && group !== "Total" && group !== name) ? `<div class="tt-val">Group: ${group}</div>` : '';
  tooltip.style("opacity", 1).html(`<div class="tt-name">${name}</div><div class="tt-val">${val.toFixed(1)} ${UNIT}</div>${gText}`);
  moveTT(e);
}
function moveTT(e) {
  let left = e.pageX + 15, top = e.pageY - 15;
  if (left + 150 > window.innerWidth) left = e.pageX - 150 - 15;
  tooltip.style("left", left + "px").style("top", top + "px");
}
function hideTT() { tooltip.style("opacity", 0); }

// ════════════════════════════════════════════════════════════════════════════
// crossfade renderer — builds new layer, fades out old one
function renderChart(json, W, H) {
  svg.attr("width", W).attr("height", H);
  // pin color domain to current categories so no cross-render bleed
  const cats = [...new Set(json.data.map(d => d.parent).filter(Boolean))];
  color.domain(cats.length ? cats : [...new Set(json.data.map(d => d.name))]);
  // reset pan/zoom when chart type changes so it starts aligned
  if (json.config.type !== lastChartType) {
    lastChartType = json.config.type;
    svg.call(zoom.transform, d3.zoomIdentity);
  }
  const oldGroup = activeGroup;
  const newGroup = zoomGroup.append("g").attr("class", "chart-layer").style("opacity", 0);
  activeGroup = newGroup;

  const type = json.config.type;
  if      (type === "bar")      drawBarChart(json, W, H, newGroup);
  else if (type === "pack")     drawCirclePack(json, W, H, newGroup);
  else if (type === "pie")      drawDonut(json, W, H, newGroup);
  else if (type === "sankey")   drawSankey(json, W, H, newGroup);
  else if (type === "sunburst") drawSunburst(json, W, H, newGroup);
  else                          drawTreemap(json, W, H, newGroup);

  newGroup.transition().duration(400).ease(d3.easeCubicOut).style("opacity", 1);
  if (oldGroup) {
    oldGroup.transition().duration(300).style("opacity", 0)
      .on("end", function() { d3.select(this).remove(); });
  }
}

// ════════════════════════════════════════════════════════════════════════════
// fetching data from json
async function poll() {
  try {
    const res = await fetch(DATA_FILE + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();

    // safeguard: skip render if python passed no/bad data
    if (!json.data || !Array.isArray(json.data)) return;
    const clean = json.data.filter(d => d.value != null && isFinite(+d.value) && +d.value > 0);
    if (clean.length === 0) return;
    json.data = clean;

    if (json.updated !== lastUpdated) {
      lastUpdated = json.updated;
      const wrap = document.getElementById("chart-wrap");
      let W = wrap.clientWidth, H = wrap.clientHeight;
      if (!W || !H || W < 100 || H < 100) { W = 800; H = 600; }
      renderChart(json, W, H);
    }
  } catch(e) {}
}

// ════════════════════════════════════════════════════════════════════════════
// hierarchial data
function buildHierarchy(data) {
  const hasParents = data.some(d => d.parent);
  if (!hasParents) return d3.hierarchy({ name: "Total", children: data }).sum(d => d.value).sort((a,b) => b.value - a.value);
  const childNames = new Set(data.map(d => d.name));
  const missing = [...new Set(data.map(d => d.parent).filter(Boolean))].filter(p => !childNames.has(p));
  const allNodes = [{ name: "Total", parent: null }, ...missing.map(p => ({ name: p, parent: "Total" })), ...data.map(d => ({ ...d, parent: d.parent || "Total" }))];
  return d3.stratify().id(d => d.name).parentId(d => d.parent)(allNodes).sum(d => d.value).sort((a,b) => b.value - a.value);
}

// ════════════════════════════════════════════════════════════════════════════
// chart_01 Treemap
function drawTreemap(json, W, H, container) {
  const root = buildHierarchy(json.data);
  d3.treemap().size([W, H]).paddingOuter(4).paddingTop(22).paddingInner(2).round(true)(root);

  // leaf nodes first (lower z-order) so parent labels render on top
  const nodes = container.selectAll(".node").data(root.leaves()).enter().append("g").attr("class", "node").attr("transform", d=>`translate(${d.x0},${d.y0})`);
  nodes.append("rect").attr("width", d=>Math.max(0, d.x1-d.x0)).attr("height", d=>Math.max(0, d.y1-d.y0)).attr("rx", 3)
    .attr("fill", d=>color(d.parent.data.name!=="Total"?d.parent.data.name:d.data.name))
    .on("mouseover", (e, d) => showTT(e, d.data.name, d.value, d.parent ? d.parent.data.name : ""))
    .on("mousemove", moveTT).on("mouseout", hideTT);

  nodes.each(function(d){
    const w = d.x1-d.x0, h = d.y1-d.y0, el = d3.select(this);
    if(w<=0||h<=0) return;
    // clipPath keeps text strictly inside the rect
    const uid = "tm-" + d.data.name.replace(/\W/g,"_") + "_" + Math.round(d.x0);
    el.append("clipPath").attr("id", uid).append("rect")
      .attr("x",2).attr("y",2).attr("width",Math.max(0,w-4)).attr("height",Math.max(0,h-4));
    const tg = el.append("g").attr("clip-path", `url(#${uid})`);
    if(w>45&&h>25) tg.append("text").attr("x",8).attr("y",18).style("font-size","12px").style("font-weight","600").style("fill","#fff").text(d.data.name);
    if(w>60&&h>40) tg.append("text").attr("x",8).attr("y",34).style("font-size","10px").style("fill","rgba(255,255,255,0.8)").text(d.value.toFixed(1));
  });

  // parent labels last — always on top of leaf rects
  const parents = container.selectAll(".parent").data(root.children || []).enter().append("g");
  parents.append("text").attr("class", "parent-label").attr("x", d=>d.x0+4).attr("y", d=>d.y0+14).text(d=>d.data.name);

  exportCanvas(json.config, {root, W, H}, "treemap");
}

// ════════════════════════════════════════════════════════════════════════════
// chart_02 Circle Packing
function drawCirclePack(json, W, H, container) {
  const root = buildHierarchy(json.data);
  d3.pack().size([W, H]).padding(4)(root);

  let focus = root;
  const g = container.append("g");

  // transparent bg rect — catches zoom-out clicks without needing svg.on()
  g.append("rect").attr("width", W).attr("height", H).attr("fill", "none").attr("pointer-events", "all")
    .on("click", () => { if (focus !== root) zoomTo(root); });

  // Pass 1 — ALL circles (so labels render on top in SVG z-order)
  const circle = g.selectAll("circle")
    .data(root.descendants()).enter().append("circle")
    .attr("cx", d => d.x).attr("cy", d => d.y).attr("r", d => d.r)
    .attr("fill", d => {
      if (!d.parent) return "none";
      if (d.children) return color(d.data.name) + "28";
      return color(d.parent.data.name !== "Total" ? d.parent.data.name : d.data.name);
    })
    .attr("stroke", d => d.children ? color(d.data.name) : "#fff")
    .attr("stroke-width", d => d.children ? 2 : 1.5)
    .attr("stroke-opacity", d => d.children ? 0.6 : 1)
    .style("cursor", d => d.parent && d.children ? "pointer" : "default")
    .on("mouseover", function(e, d) {
      if (!d.children && d.parent) {
        d3.select(this).attr("opacity", 0.75);
        showTT(e, d.data.name, d.value, d.parent.data.name !== "Total" ? d.parent.data.name : "");
      }
    })
    .on("mousemove", moveTT)
    .on("mouseout", function() { d3.select(this).attr("opacity", 1); hideTT(); })
    .on("click", function(e, d) {
      e.stopPropagation();
      if (d.children && focus !== d) zoomTo(d);
      else if (focus !== root) zoomTo(root);
    });

  // Pass 2 — ALL labels after all circles (always on top)
  const label = g.selectAll("text")
    .data(root.descendants()).enter().append("text")
    .attr("x", d => d.x).attr("y", d => d.y)
    .attr("text-anchor", "middle").attr("dy", "0.35em")
    .style("fill", d => d.children ? color(d.data.name) : "#fff")
    .style("font-weight", d => d.children ? "700" : "600")
    .style("font-size", d => d.children ? "12px" : "11px")
    .style("pointer-events", "none")
    .text(d => d.data.name !== "Total" ? d.data.name : "")
    .style("opacity", d => d.parent === root ? 1 : 0);

  function zoomTo(v) {
    focus = v;
    const k = Math.min(W, H) / (v.r * 2.2);
    const tx = W/2 - v.x * k, ty = H/2 - v.y * k;
    g.transition().duration(500).ease(d3.easeCubicInOut)
      .attr("transform", `translate(${tx},${ty}) scale(${k})`);
    label.transition().duration(500)
      .style("opacity", d => (!d.parent || (d.parent !== v && d !== v)) ? 0 : 1)
      .style("font-size", d => `${(d.children ? 12 : 11) / k}px`);
  }

  exportCanvas(json.config, {root, W, H}, "pack");
}

// ════════════════════════════════════════════════════════════════════════════
// chart_03 Bar Chart
function drawBarChart(json, W, H, container) {
  const hasParents = json.data.some(d => d.parent);
  const margin = {top: 8, right: 80, bottom: 8, left: 160};
  const w = W - margin.left - margin.right;

  let rows = [];
  if (hasParents) {
    const groups = d3.group(json.data, d => d.parent || "Other");
    [...groups.entries()]
      .sort((a,b) => d3.sum(b[1], d=>d.value) - d3.sum(a[1], d=>d.value))
      .forEach(([parent, children]) => {
        rows.push({type:'group', name:parent, total: d3.sum(children, d=>d.value)});
        children.sort((a,b)=>b.value-a.value).forEach(d => rows.push({type:'bar', ...d}));
      });
  } else {
    json.data.sort((a,b)=>b.value-a.value).forEach(d => rows.push({type:'bar', ...d}));
  }

  const GROUP_H = 20;
  const nBars = rows.filter(r => r.type === 'bar').length;
  const nGroups = rows.filter(r => r.type === 'group').length;
  const availH = H - margin.top - margin.bottom - nGroups * (GROUP_H + 2);
  const BAR_H  = Math.max(10, Math.min(26, Math.floor(availH / Math.max(nBars, 1)) - 4));
  const BAR_PAD = Math.max(2, Math.floor(BAR_H * 0.18));
  let yPos = 0;
  rows.forEach(r => { r._y = yPos; yPos += (r.type==='group' ? GROUP_H + 2 : BAR_H + BAR_PAD); });

  const xMax = d3.max(rows.filter(r=>r.type==='bar'), d=>d.value);
  const x = d3.scaleLinear().domain([0, xMax]).range([0, w]);
  const g = container.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  rows.filter(r=>r.type==='group').forEach(r => {
    g.append("text").attr("x", -margin.left+4).attr("y", r._y+14)
      .style("font-size","11px").style("font-weight","700").style("fill", color(r.name))
      .style("letter-spacing","0.06em").text(r.name.toUpperCase());
    g.append("line").attr("x1",-margin.left+4).attr("x2",w).attr("y1",r._y+18).attr("y2",r._y+18)
      .attr("stroke", color(r.name)).attr("stroke-width",1).attr("opacity",0.25);
  });

  const barData = rows.filter(r=>r.type==='bar');

  g.selectAll(".bar").data(barData).enter().append("rect").attr("class","bar")
    .attr("y", d=>d._y).attr("height", BAR_H).attr("x",0).attr("width",0).attr("rx",2)
    .attr("fill", d=>color(d.parent||d.name))
    .on("mouseover", function(e,d){ d3.select(this).transition().duration(100).attr("opacity",0.75); showTT(e,d.name,d.value,d.parent); })
    .on("mousemove", moveTT)
    .on("mouseout", function(){ d3.select(this).transition().duration(150).attr("opacity",1); hideTT(); })
    .transition().duration(600).ease(d3.easeCubicOut).attr("width", d=>x(d.value));

  g.selectAll(".label-name").data(barData).enter().append("text")
    .attr("x",-10).attr("y", d=>d._y+BAR_H/2+4).attr("text-anchor","end")
    .style("font-size","12px").style("font-weight","600").style("opacity",0).text(d=>d.name)
    .transition().duration(600).style("opacity",1);

  g.selectAll(".label-val").data(barData).enter().append("text")
    .attr("x", d=>x(d.value)+8).attr("y", d=>d._y+BAR_H/2+4)
    .style("font-size","11px").style("fill","#666").style("opacity",0).text(d=>d.value.toFixed(1))
    .transition().duration(600).ease(d3.easeCubicOut).style("opacity",1);

  exportCanvas(json.config, {rows, x, margin, BAR_H, GROUP_H, w, W, H}, "bar");
}

// ════════════════════════════════════════════════════════════════════════════
// chart_04 Donut
function drawDonut(json, W, H, container) {
  const cx = W/2, cy = H/2;
  const outerR = Math.min(W, H) / 2 - 20;
  const hasParents = json.data.some(d => d.parent);
  const total = d3.sum(json.data, d => d.value);

  const g = container.append("g").attr("transform", `translate(${cx},${cy})`);

  const centerName = g.append("text").attr("text-anchor","middle").attr("dy","-0.3em")
    .style("font-size","14px").style("font-weight","700").style("fill","#111").text("Total");
  const centerVal = g.append("text").attr("text-anchor","middle").attr("dy","1.1em")
    .style("font-size","12px").style("fill","#666").text(total.toFixed(1) + " " + UNIT);
  function resetCenter() { centerName.text("Total"); centerVal.text(total.toFixed(1) + " " + UNIT); }

  if (hasParents) {
    const innerR = outerR * 0.35, midR = outerR * 0.62;
    const innerArc = d3.arc().innerRadius(innerR).outerRadius(midR - 3).cornerRadius(2).padAngle(0.025);
    const outerArc = d3.arc().innerRadius(midR + 1).outerRadius(outerR).cornerRadius(2).padAngle(0.008);

    const groups = d3.group(json.data, d => d.parent || "Other");
    const groupList = [...groups.entries()]
      .map(([name, ch]) => ({ name, value: d3.sum(ch, d=>d.value), children: ch.sort((a,b)=>b.value-a.value) }))
      .sort((a,b) => b.value - a.value);

    const innerPie = d3.pie().value(d=>d.value).sort(null).padAngle(0.025)(groupList);

    // Inner ring (parents)
    g.selectAll(".i-arc").data(innerPie).enter().append("path").attr("class","i-arc")
      .attr("fill", d=>color(d.data.name)).attr("stroke","#fff").attr("stroke-width",2)
      .style("cursor","pointer")
      .on("mouseover", function(e,d) {
        d3.select(this).transition().duration(100).attr("transform","scale(1.05)");
        centerName.text(d.data.name); centerVal.text(d.data.value.toFixed(1)+" "+UNIT);
        showTT(e, d.data.name, d.data.value, "");
      })
      .on("mousemove", moveTT)
      .on("mouseout", function() { d3.select(this).transition().duration(150).attr("transform","scale(1)"); resetCenter(); hideTT(); })
      .transition().duration(700).ease(d3.easeCubicOut)
      .attrTween("d", d => { const i = d3.interpolate({startAngle:d.startAngle,endAngle:d.startAngle},d); return t=>innerArc(i(t)); });

    // Inner ring labels (name + value)
    innerPie.forEach(s => {
      if (s.endAngle - s.startAngle < 0.18) return;
      const mid = (s.startAngle + s.endAngle) / 2;
      const r = (innerR + midR - 3) / 2;
      const t = g.append("text")
        .attr("transform", `translate(${Math.sin(mid)*r},${-Math.cos(mid)*r})`)
        .attr("text-anchor","middle").style("pointer-events","none");
      t.append("tspan").attr("x",0).attr("dy","-0.5em")
        .style("font-size","11px").style("font-weight","700").style("fill","#fff").text(s.data.name);
      t.append("tspan").attr("x",0).attr("dy","1.3em")
        .style("font-size","10px").style("fill","rgba(255,255,255,0.85)").text(s.data.value.toFixed(1)+" "+UNIT);
    });

    // Outer ring (children)
    innerPie.forEach(pSlice => {
      const children = pSlice.data.children;
      const childPie = d3.pie().value(d=>d.value).sort(null)
        .startAngle(pSlice.startAngle + 0.012).endAngle(pSlice.endAngle - 0.012).padAngle(0.006)(children);

      g.selectAll(null).data(childPie).enter().append("path")
        .attr("fill", color(pSlice.data.name))
        .attr("opacity", (d,i) => 0.45 + (i / Math.max(children.length - 1, 1)) * 0.55)
        .attr("stroke","#fff").attr("stroke-width",1)
        .style("cursor","pointer")
        .on("mouseover", function(e,d) {
          d3.select(this).transition().duration(100).attr("transform","scale(1.04)");
          centerName.text(d.data.name); centerVal.text(d.data.value.toFixed(1)+" "+UNIT);
          showTT(e, d.data.name, d.data.value, pSlice.data.name);
        })
        .on("mousemove", moveTT)
        .on("mouseout", function() { d3.select(this).transition().duration(150).attr("transform","scale(1)"); resetCenter(); hideTT(); })
        .transition().duration(700).ease(d3.easeCubicOut)
        .attrTween("d", d => { const i = d3.interpolate({startAngle:d.startAngle,endAngle:d.startAngle},d); return t=>outerArc(i(t)); });

      // Outer ring labels
      childPie.forEach(s => {
        if (s.endAngle - s.startAngle < 0.15) return;
        const mid = (s.startAngle + s.endAngle) / 2;
        const r = (midR + 1 + outerR) / 2;
        const t = g.append("text")
          .attr("transform", `translate(${Math.sin(mid)*r},${-Math.cos(mid)*r})`)
          .attr("text-anchor","middle").style("pointer-events","none");
        t.append("tspan").attr("x",0).attr("dy", s.endAngle - s.startAngle > 0.3 ? "-0.4em" : "0.35em")
          .style("font-size","10px").style("font-weight","700").style("fill","#fff").text(s.data.name);
        if (s.endAngle - s.startAngle > 0.3) {
          t.append("tspan").attr("x",0).attr("dy","1.3em")
            .style("font-size","9px").style("fill","rgba(255,255,255,0.85)").text(s.data.value.toFixed(1)+" "+UNIT);
        }
      });
    });

  } else {
    const innerR = outerR * 0.45;
    const arc = d3.arc().innerRadius(innerR).outerRadius(outerR).cornerRadius(2).padAngle(0.015);
    const pie = d3.pie().value(d=>d.value).sort(null)(json.data.sort((a,b)=>b.value-a.value));

    g.selectAll(".slice").data(pie).enter().append("path").attr("class","slice")
      .attr("fill", d=>color(d.data.name)).attr("stroke","#fff").attr("stroke-width",2)
      .style("cursor","pointer")
      .on("mouseover", function(e,d) {
        d3.select(this).transition().duration(100).attr("transform","scale(1.05)");
        centerName.text(d.data.name); centerVal.text(d.data.value.toFixed(1)+" "+UNIT);
        showTT(e, d.data.name, d.data.value, "");
      })
      .on("mousemove", moveTT)
      .on("mouseout", function() { d3.select(this).transition().duration(150).attr("transform","scale(1)"); resetCenter(); hideTT(); })
      .transition().duration(700).ease(d3.easeCubicOut)
      .attrTween("d", d => { const i = d3.interpolate({startAngle:0,endAngle:0},d); return t=>arc(i(t)); });

    // Labels on simple pie
    pie.forEach(s => {
      if (s.endAngle - s.startAngle < 0.18) return;
      const mid = (s.startAngle + s.endAngle) / 2;
      const r = (innerR + outerR) / 2;
      const t = g.append("text")
        .attr("transform", `translate(${Math.sin(mid)*r},${-Math.cos(mid)*r})`)
        .attr("text-anchor","middle").style("pointer-events","none");
      t.append("tspan").attr("x",0).attr("dy", s.endAngle - s.startAngle > 0.32 ? "-0.4em" : "0.35em")
        .style("font-size","11px").style("font-weight","700").style("fill","#fff").text(s.data.name);
      if (s.endAngle - s.startAngle > 0.32) {
        t.append("tspan").attr("x",0).attr("dy","1.3em")
          .style("font-size","10px").style("fill","rgba(255,255,255,0.85)").text(s.data.value.toFixed(1)+" "+UNIT);
      }
    });
  }

  exportCanvas(json.config, {json, W, H, outerR, hasParents}, "pie");
}

// ════════════════════════════════════════════════════════════════════════════
// chart_05 Sun Burst
function drawSunburst(json, W, H, container) {
  const root = buildHierarchy(json.data);
  d3.partition().size([2 * Math.PI, root.height + 1])(root);
  root.each(d => d.current = d);

  const maxR = Math.min(W, H) / 2 - 10;
  const radius = maxR / (root.height + 1);

  const arc = d3.arc()
    .startAngle(d => d.x0)
    .endAngle(d => d.x1)
    .padAngle(d => Math.min((d.x1 - d.x0) / 2, 0.005))
    .padRadius(radius * 1.5)
    .innerRadius(d => Math.max(0, d.y0) * radius)
    .outerRadius(d => Math.max(d.y0 * radius, d.y1 * radius - 1));

  const g = container.append("g").attr("transform", `translate(${W/2},${H/2})`);

  const path = g.selectAll("path")
    .data(root.descendants().filter(d => d.depth))
    .join("path")
    .attr("fill", d => { let a = d; while (a.depth > 1) a = a.parent; return color(a.data.name); })
    .attr("fill-opacity", d => arcVisible(d.current) ? (d.children ? 0.6 : 0.9) : 0)
    .attr("d", d => arc(d.current))
    .style("cursor", d => d.children ? "pointer" : "default")
    .on("mouseover", (e, d) => showTT(e, d.data.name, d.value, d.parent?.data.name !== "Total" ? d.parent?.data.name : ""))
    .on("mousemove", moveTT)
    .on("mouseout", hideTT)
    .on("click", clicked);

  const label = g.selectAll("text")
    .data(root.descendants().filter(d => d.depth))
    .join("text")
    .attr("fill-opacity", d => +labelVisible(d.current))
    .attr("transform", d => labelTransform(d.current))
    .style("fill", "#fff").style("pointer-events", "none").style("text-anchor", "middle");

  label.append("tspan")
    .attr("x", 0).attr("dy", "-0.3em")
    .style("font-size", "11px").style("font-weight", "700")
    .text(d => d.data.name);

  label.append("tspan")
    .attr("x", 0).attr("dy", "1.3em")
    .style("font-size", "10px").style("font-weight", "400")
    .style("fill", "rgba(255,255,255,0.85)")
    .text(d => d.value.toFixed(1) + " " + UNIT);

  const center = g.append("circle").attr("r", radius)
    .attr("fill", "none").attr("pointer-events", "all").style("cursor", "pointer")
    .on("click", () => clicked(null, root));

  const centerText = g.append("text").attr("text-anchor", "middle").attr("dy", "-0.4em")
    .style("font-size", "13px").style("font-weight", "700").style("fill", "#333").style("pointer-events","none")
    .text("Total");

  const centerVal = g.append("text").attr("text-anchor", "middle").attr("dy", "1em")
    .style("font-size", "11px").style("fill", "#666").style("pointer-events","none")
    .text(root.value.toFixed(1) + " " + UNIT);

  function clicked(event, p) {
    root.each(d => d.target = {
      x0: Math.max(0, Math.min(1, (d.x0 - p.x0) / (p.x1 - p.x0))) * 2 * Math.PI,
      x1: Math.max(0, Math.min(1, (d.x1 - p.x0) / (p.x1 - p.x0))) * 2 * Math.PI,
      y0: Math.max(0, d.y0 - p.depth),
      y1: Math.max(0, d.y1 - p.depth)
    });
    const t = g.transition().duration(600).ease(d3.easeCubicInOut);
    path.transition(t)
      .tween("data", d => { const i = d3.interpolate(d.current, d.target); return t => d.current = i(t); })
      .filter(function(d) { return +this.getAttribute("fill-opacity") || arcVisible(d.target); })
      .attr("fill-opacity", d => arcVisible(d.target) ? (d.children ? 0.6 : 0.9) : 0)
      .attrTween("d", d => () => arc(d.current));
    label.filter(function(d) { return +this.getAttribute("fill-opacity") || labelVisible(d.target); })
      .transition(t)
      .attr("fill-opacity", d => +labelVisible(d.target))
      .attrTween("transform", d => () => labelTransform(d.current));
    centerText.text(p === root ? "Total" : p.data.name);
    centerVal.text(p.value.toFixed(1) + " " + UNIT);
  }

  function arcVisible(d)   { return d.y1 <= root.height + 1 && d.y0 >= 1 && d.x1 > d.x0; }
  function labelVisible(d) { return d.y1 <= root.height + 1 && d.y0 >= 1 && (d.y1 - d.y0) * (d.x1 - d.x0) > 0.04; }
  function labelTransform(d) {
    const x = (d.x0 + d.x1) / 2 * 180 / Math.PI;
    const y = (d.y0 + d.y1) / 2 * radius;
    return `rotate(${x - 90}) translate(${y},0) rotate(${x < 180 ? 0 : 180})`;
  }

  exportCanvas(json.config, {root, W, H, radius}, "sunburst");
}

// ════════════════════════════════════════════════════════════════════════════
// chart_06 Sankey
function drawSankey(json, W, H, container) {
  const nodeByName = new Map();
  const nodes = [], links = [];
  json.data.forEach(d => {
    if(!d.value) return;
    const pName = (d.parent || "Total") + " ";
    if (!nodeByName.has(pName)) { nodeByName.set(pName, {name: pName}); nodes.push(nodeByName.get(pName)); }
    if (!nodeByName.has(d.name)) { nodeByName.set(d.name, {name: d.name}); nodes.push(nodeByName.get(d.name)); }
    links.push({ source: nodeByName.get(pName), target: nodeByName.get(d.name), value: d.value });
  });

  const sankey = d3.sankey().nodeWidth(15).nodePadding(15).extent([[10, 10],[W - 140, H - 20]]);
  const {nodes: sNodes, links: sLinks} = sankey({nodes, links});

  const g = container.append("g");
  g.selectAll(".link").data(sLinks).enter().append("path").attr("class", "sankey-link")
    .attr("d", d3.sankeyLinkHorizontal()).attr("stroke-width", d => Math.max(1, d.width))
    .attr("stroke", d => color(d.source.name)).attr("fill", "none")
    .on("mouseover", (e, d) => showTT(e, d.source.name.trim() + " → " + d.target.name.trim(), d.value, ""))
    .on("mousemove", moveTT).on("mouseout", hideTT);

  const node = g.selectAll(".node").data(sNodes).enter().append("g").attr("class", "node");
  node.append("rect").attr("x", d=>d.x0).attr("y", d=>d.y0).attr("height", d=>d.y1-d.y0).attr("width", sankey.nodeWidth())
    .attr("fill", d=>color(d.name.trim())).attr("stroke","#fff")
    .on("mouseover", (e,d) => showTT(e, d.name.trim(), d.value, ""))
    .on("mousemove", moveTT).on("mouseout", hideTT);

  const nodeText = node.append("text")
    .attr("x", d=>d.x0<W/2?d.x1+6:d.x0-6).attr("y", d=>(d.y1+d.y0)/2)
    .attr("text-anchor", d=>d.x0<W/2?"start":"end").style("pointer-events","none");
  nodeText.append("tspan")
    .attr("x", d=>d.x0<W/2?d.x1+6:d.x0-6).attr("dy","-0.3em")
    .style("font-size","12px").style("font-weight","700").style("fill","#222").text(d=>d.name.trim());
  nodeText.append("tspan")
    .attr("x", d=>d.x0<W/2?d.x1+6:d.x0-6).attr("dy","1.3em")
    .style("font-size","10px").style("fill","#666").text(d=>d.value.toFixed(1)+" "+UNIT);

  exportCanvas(json.config, {sNodes, sLinks, W, H}, "sankey");
}

// ════════════════════════════════════════════════════════════════════════════
// graphics export
function exportCanvas(config, layout, type) {
  const exportW = config.w || 500;
  const scale = exportW / Math.max(layout.W, 1);
  const fs = config.font_scale || 1.0;

  const PADDING = 4 * scale;
  const vpH = Math.round(layout.H * scale) + PADDING;

  const canvas = document.createElement('canvas');
  canvas.width = exportW; canvas.height = vpH;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, exportW, vpH);

  const drawW = exportW - PADDING;
  const drawH = vpH - PADDING;
  ctx.translate(PADDING / 2, PADDING / 2);

  if (type === "treemap") {
    d3.treemap().size([drawW, drawH]).paddingOuter(4*scale).paddingTop(22*scale).paddingInner(2*scale).round(true)(layout.root);
    // Pass 1: leaf rects
    layout.root.leaves().forEach(d => {
      const w=d.x1-d.x0, h=d.y1-d.y0; if(w<=0||h<=0) return;
      ctx.fillStyle=color(d.parent.data.name!=="Total"?d.parent.data.name:d.data.name);
      ctx.beginPath(); ctx.roundRect(d.x0,d.y0,w,h,3*scale); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2*scale; ctx.stroke();
    });
    // Pass 2: parent labels on top of rects (positions in canvas px — no *scale)
    ctx.fillStyle='#555'; ctx.font=`bold ${11*fs}px sans-serif`; ctx.textAlign='left';
    (layout.root.children||[]).forEach(d => { ctx.fillText(d.data.name.toUpperCase(), d.x0+4, d.y0+14); });
    // Pass 3: leaf text clipped to each rect (all units = canvas px)
    layout.root.leaves().forEach(d => {
      const w=d.x1-d.x0, h=d.y1-d.y0; if(w<48||h<24) return;
      ctx.save();
      ctx.beginPath(); ctx.rect(d.x0+2, d.y0+2, Math.max(0,w-4), Math.max(0,h-4)); ctx.clip();
      ctx.fillStyle='#fff'; ctx.font=`bold ${12*fs}px sans-serif`; ctx.textAlign='left';
      ctx.fillText(d.data.name, d.x0+5, d.y0+15);
      if(w>=65&&h>=38){ ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font=`${10*fs}px sans-serif`; ctx.fillText(d.data.value.toFixed(1), d.x0+5, d.y0+28); }
      ctx.restore();
    });
  }
  else if (type === "pack") {
    d3.pack().size([drawW, drawH]).padding(3*scale)(layout.root);
    const MIN_R_NAME = Math.max(drawW, drawH) * 0.08;
    const MIN_R_VAL  = MIN_R_NAME * 1.4;
    layout.root.descendants().slice(1).forEach(d => {
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      ctx.fillStyle = d.children ? "rgba(235,235,235,0.7)" : color(d.parent.data.name!=="Total"?d.parent.data.name:d.data.name);
      ctx.fill(); ctx.strokeStyle = d.children ? "#ddd" : "#fff"; ctx.lineWidth = 2*scale; ctx.stroke();
    });
    ctx.textAlign = "center";
    layout.root.descendants().slice(1).forEach(d => {
      if (d.children || d.r < MIN_R_NAME) return;
      ctx.fillStyle = '#fff'; ctx.font = `bold ${12*fs}px sans-serif`;
      ctx.fillText(d.data.name, d.x, d.y + (d.r > MIN_R_VAL ? -4*scale : 4*scale));
      if (d.r > MIN_R_VAL) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = `${10*fs}px sans-serif`;
        ctx.fillText(d.value.toFixed(1)+" "+UNIT, d.x, d.y + 12*scale);
      }
    });
    ctx.textAlign = "left";
  }
  else if (type === "bar") {
    ctx.translate(layout.margin.left*scale, layout.margin.top*scale);
    layout.rows.forEach(r => {
      if (r.type === 'group') {
        ctx.fillStyle=color(r.name); ctx.font=`bold ${11*fs}px sans-serif`; ctx.textAlign='left';
        ctx.fillText(r.name.toUpperCase(), -layout.margin.left*scale+4*scale, r._y*scale+14*scale);
      } else {
        const bw=layout.x(r.value)*scale, bh=layout.BAR_H*scale, by=r._y*scale;
        ctx.fillStyle=color(r.parent||r.name); ctx.beginPath(); ctx.roundRect(0,by,bw,bh,2*scale); ctx.fill();
        ctx.fillStyle='#111'; ctx.font=`bold ${12*fs}px sans-serif`; ctx.textAlign='right'; ctx.fillText(r.name, -10*scale, by+bh/2+4*scale);
        ctx.fillStyle='#666'; ctx.font=`${11*fs}px sans-serif`; ctx.textAlign='left'; ctx.fillText(r.value.toFixed(1), bw+8*scale, by+bh/2+4*scale);
      }
    });
  }
  else if (type === "pie") {
    const cx = drawW/2, cy = drawH/2;
    const outerR = Math.min(drawW, drawH)/2 - 10*scale;
    const total = d3.sum(layout.json.data, d=>d.value);
    ctx.save();
    ctx.translate(cx, cy);

    if (layout.hasParents) {
      const innerR = outerR*0.35, midR = outerR*0.62;
      const groups = d3.group(layout.json.data, d=>d.parent||"Other");
      const groupList = [...groups.entries()]
        .map(([name,ch])=>({name, value:d3.sum(ch,d=>d.value), children:ch.sort((a,b)=>b.value-a.value)}))
        .sort((a,b)=>b.value-a.value);
      const innerPie = d3.pie().value(d=>d.value).sort(null).padAngle(0.025)(groupList);
      // Pass 1: outer arcs
      innerPie.forEach(pSlice => {
        const children = pSlice.data.children;
        const childPie = d3.pie().value(d=>d.value).sort(null)
          .startAngle(pSlice.startAngle+0.012).endAngle(pSlice.endAngle-0.012).padAngle(0.006)(children);
        childPie.forEach((s,i) => {
          const sa = s.startAngle-Math.PI/2, ea = s.endAngle-Math.PI/2;
          ctx.globalAlpha = 0.45 + (i/Math.max(children.length-1,1))*0.55;
          ctx.beginPath(); ctx.arc(0,0,outerR,sa,ea); ctx.arc(0,0,midR+1,ea,sa,true); ctx.closePath();
          ctx.fillStyle = color(pSlice.data.name); ctx.fill();
          ctx.globalAlpha = 1; ctx.strokeStyle='#fff'; ctx.lineWidth=scale; ctx.stroke();
        });
      });
      // Pass 2: inner arcs on top
      innerPie.forEach(s => {
        const sa = s.startAngle - Math.PI/2, ea = s.endAngle - Math.PI/2;
        ctx.beginPath(); ctx.arc(0,0,midR-3,sa,ea); ctx.arc(0,0,innerR,ea,sa,true); ctx.closePath();
        ctx.fillStyle = color(s.data.name); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2*scale; ctx.stroke();
      });
      // Pass 3: inner labels on top of all arcs
      innerPie.forEach(s => {
        if (s.endAngle - s.startAngle <= 0.4) return;
        const mid = (s.startAngle+s.endAngle)/2, r = (innerR+midR-3)/2;
        ctx.fillStyle='#fff'; ctx.font=`bold ${11*fs}px sans-serif`; ctx.textAlign='center';
        ctx.fillText(s.data.name, Math.sin(mid)*r, -Math.cos(mid)*r+4*scale);
      });
    } else {
      const innerR = outerR*0.45;
      const pie = d3.pie().value(d=>d.value).sort(null)(layout.json.data.sort((a,b)=>b.value-a.value));
      // Pass 1: all arcs
      pie.forEach(s => {
        const sa = s.startAngle-Math.PI/2, ea = s.endAngle-Math.PI/2;
        ctx.beginPath(); ctx.arc(0,0,outerR,sa,ea); ctx.arc(0,0,innerR,ea,sa,true); ctx.closePath();
        ctx.fillStyle = color(s.data.name); ctx.fill();
        ctx.strokeStyle='#fff'; ctx.lineWidth=2*scale; ctx.stroke();
      });
      // Pass 2: slice labels on top
      pie.forEach(s => {
        if (s.endAngle - s.startAngle <= 0.25) return;
        const mid = (s.startAngle+s.endAngle)/2, r = (innerR+outerR)/2;
        ctx.fillStyle='#fff'; ctx.font=`bold ${11*fs}px sans-serif`; ctx.textAlign='center';
        ctx.fillText(s.data.name, Math.sin(mid)*r, -Math.cos(mid)*r+4*scale);
      });
    }
    ctx.fillStyle='#111'; ctx.font=`bold ${14*fs}px sans-serif`; ctx.textAlign='center';
    ctx.fillText("Total", 0, -4*scale);
    ctx.fillStyle='#666'; ctx.font=`${12*fs}px sans-serif`;
    ctx.fillText(total.toFixed(1)+" "+UNIT, 0, 16*scale);
    ctx.restore();
  }
  else if (type === "sunburst") {
    const maxR = Math.min(drawW, drawH) / 2 - 5 * scale;
    const r = maxR / (layout.root.height + 1);
    d3.partition().size([2 * Math.PI, layout.root.height + 1])(layout.root);
    ctx.save();
    ctx.translate(drawW / 2, drawH / 2);
    layout.root.descendants().filter(d => d.depth).forEach(d => {
      let anc = d; while (anc.depth > 1) anc = anc.parent;
      ctx.beginPath();
      ctx.arc(0, 0, Math.max(d.y0 * r, d.y1 * r - 1), d.x0 - Math.PI/2, d.x1 - Math.PI/2);
      ctx.arc(0, 0, d.y0 * r, d.x1 - Math.PI/2, d.x0 - Math.PI/2, true);
      ctx.closePath();
      ctx.fillStyle = color(anc.data.name);
      ctx.globalAlpha = d.children ? 0.6 : 0.9; ctx.fill(); ctx.globalAlpha = 1;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = scale; ctx.stroke();
      const span = (d.x1 - d.x0) * (d.y0 + d.y1) / 2 * r;
      if (span > 38) {
        const angle = (d.x0 + d.x1) / 2, midR = (d.y0 + d.y1) / 2 * r;
        ctx.save();
        ctx.rotate(angle - Math.PI / 2); ctx.translate(midR, 0);
        if (angle > Math.PI) ctx.rotate(Math.PI);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.font = `bold ${11*fs}px sans-serif`;
        ctx.fillText(d.data.name, 0, span > 58 ? -3 * scale : 4 * scale);
        if (span > 58) {
          ctx.globalAlpha = 0.85; ctx.font = `${10*fs}px sans-serif`;
          ctx.fillText(d.value.toFixed(1) + " " + UNIT, 0, 10 * scale);
          ctx.globalAlpha = 1;
        }
        ctx.restore();
      }
    });
    const total = layout.root.value;
    ctx.fillStyle = '#333'; ctx.font = `bold ${13*fs}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText("Total", 0, -4 * scale);
    ctx.fillStyle = '#666'; ctx.font = `${11*fs}px sans-serif`;
    ctx.fillText(total.toFixed(1) + " " + UNIT, 0, 12 * scale);
    ctx.restore();
  }
  else if (type === "sankey") {
    ctx.save();
    ctx.scale(scale, scale);
    layout.sLinks.forEach(l => {
      ctx.beginPath(); d3.sankeyLinkHorizontal().context(ctx)(l);
      ctx.strokeStyle=color(l.source.name); ctx.globalAlpha=0.35;
      ctx.lineWidth=Math.max(1,l.width); ctx.stroke();
    });
    ctx.globalAlpha=1.0;
    layout.sNodes.forEach(n => {
      ctx.fillStyle=color(n.name.trim());
      ctx.fillRect(n.x0,n.y0,n.x1-n.x0,n.y1-n.y0);
      ctx.fillStyle="#111"; ctx.font=`bold ${12*fs/scale}px sans-serif`;
      if(n.x0<layout.W/2){ ctx.textAlign="start"; ctx.fillText(n.name.trim(),n.x1+6,(n.y0+n.y1)/2+4); }
      else { ctx.textAlign="end"; ctx.fillText(n.name.trim(),n.x0-6,(n.y0+n.y1)/2+4); }
    });
    ctx.restore();
  }

  const _port = window.__GH_PORT || location.port || 8080;
  canvas.toBlob(blob => fetch(`http://127.0.0.1:${_port}/screenshot`, { method: 'POST', body: blob }).catch(()=>{}));
}

poll();
setInterval(poll, POLL_MS);
</script>
